apiVersion: apps/v1
kind: Deployment
metadata:
  name: personality-api-deployment
  labels:
    app: personality-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: personality-api
  template:
    metadata:
      labels:
        app: personality-api
    spec:
      containers:
      - name: api
        image: 740820043343.dkr.ecr.us-east-1.amazonaws.com/personality-prediction-api:94b1e7ae33ea031a7ce47a9da4995ad695f708a3
        ports:
        - containerPort: 8000
      imagePullSecrets:
      - name: aws-registry-key